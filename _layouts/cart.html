---
layout: default
---

<div class="max-w-3xl mx-auto px-4 py-8 min-h-[60vh]">
  <h1 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-4">Ваши покупки</h1>
  
  <div id="cart-items" class="space-y-4">
    <p class="text-center text-gray-500 py-10">Загрузка...</p>
  </div>

  <div id="cart-summary" style="display:none;" class="mt-8 bg-gray-50 p-6 rounded-xl border border-gray-100 shadow-sm">
    <div class="text-center mb-6">
      <span class="text-gray-600">Итого к оплате:</span>
      <div class="text-3xl font-bold text-gray-900 mt-1"><span id="total-price">0</span> {{ site.currency }}</div>
    </div>
    
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <button onclick="checkout('wa')" class="w-full flex items-center justify-center gap-2 bg-[#25D366] hover:bg-[#20bd5a] text-white py-3 px-4 rounded-lg font-bold transition-colors shadow-sm active:scale-95">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
        WhatsApp
      </button>
      <button onclick="checkout('tg')" class="w-full flex items-center justify-center gap-2 bg-[#0088cc] hover:bg-[#0077b3] text-white py-3 px-4 rounded-lg font-bold transition-colors shadow-sm active:scale-95">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        Telegram
      </button>
    </div>
    
    <div class="mt-6 text-center">
      <button onclick="clearCart()" class="text-sm text-gray-500 hover:text-red-500 underline transition-colors">
        Очистить корзину
      </button>
    </div>
  </div>
</div>

<script>
  const escapeHTML = (str) => {
    if (!str) return '';
    return String(str).replace(/[&<>'"]/g, 
      tag => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          "'": '&#39;',
          '"': '&quot;'
        }[tag] || tag)
    );
  };

  function loadCart() {
    let cart = JSON.parse(localStorage.getItem('mySimpleCart')) || [];
    let container = document.getElementById('cart-items');
    let summary = document.getElementById('cart-summary');
    let totalSpan = document.getElementById('total-price');

    container.innerHTML = '';
    let total = 0;

    if (cart.length === 0) {
      container.innerHTML = '<div class="text-center py-12"><div class="text-5xl mb-4 opacity-50">🛒</div><p class="text-gray-500">В корзине пусто</p><a href="{{ "/" | relative_url }}" class="inline-block mt-4 text-blue-600 hover:underline">Вернуться к покупкам</a></div>';
      summary.style.display = 'none';
      if(window.updateBadge) window.updateBadge();
      return;
    }

    summary.style.display = 'block';

    cart.forEach((item, index) => {
      total += parseFloat(item.price) || 0;
      let div = document.createElement('div');
      div.className = 'flex items-center justify-between p-4 bg-white border border-gray-100 rounded-xl shadow-sm relative group hover:shadow-md transition-shadow';
      div.innerHTML = `
        <div class="flex items-center gap-4 flex-grow">
          <img src="${escapeHTML(item.image)}" alt="${escapeHTML(item.title)}" class="w-20 h-20 object-cover rounded-lg bg-gray-100 flex-shrink-0">
          <div class="flex flex-col">
            <span class="font-bold text-gray-800 leading-snug">${escapeHTML(item.title)}</span>
            <span class="text-blue-600 font-bold mt-1">${escapeHTML(item.price)} {{ site.currency }}</span>
          </div>
        </div>
        <button class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors ml-4" title="Удалить" onclick="removeItem(${index})">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      `;
      container.appendChild(div);
    });

    totalSpan.innerText = total.toLocaleString('ru-RU', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
    if(window.updateBadge) window.updateBadge();
  }

  function removeItem(index) {
    let cart = JSON.parse(localStorage.getItem('mySimpleCart')) || [];
    cart.splice(index, 1);
    localStorage.setItem('mySimpleCart', JSON.stringify(cart));
    loadCart();
  }

  function clearCart() {
    if(confirm('Очистить корзину?')) {
      localStorage.removeItem('mySimpleCart');
      loadCart();
    }
  }

  function checkout(messenger) {
    let cart = JSON.parse(localStorage.getItem('mySimpleCart')) || [];
    let total = 0;
    let message = "Здравствуйте! Хочу сделать заказ:\n\n";
    
    cart.forEach((item, index) => {
      message += `${index + 1}. ${item.title} — ${item.price} {{ site.currency }}\n`;
      total += parseFloat(item.price) || 0;
    });
    
    message += `\n🛒 *Сумма заказа:* ${total.toLocaleString('ru-RU', { minimumFractionDigits: 0, maximumFractionDigits: 2 })} {{ site.currency }}`;

    let phone = "{{ site.whatsapp_phone }}";
    let tgUser = "{{ site.telegram_user }}";
    
    let url = messenger === 'wa' 
      ? `https://wa.me/${phone}?text=${encodeURIComponent(message)}`
      : `https://t.me/${tgUser}?text=${encodeURIComponent(message)}`;
      
    // Очищаем корзину, предполагая, что заказ будет отправлен
    localStorage.removeItem('mySimpleCart');
    loadCart();
      
    window.location.href = url;
  }

  document.addEventListener('DOMContentLoaded', () => {
    loadCart();
  });
</script>
